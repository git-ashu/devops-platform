apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jenkins
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://charts.jenkins.io
    chart: jenkins
    targetRevision: 5.1.3
    helm:
      values: |
        controller:
          serviceType: ClusterIP

          admin:
            username: admin
            password: admin123

          serviceAccount:
            create: false
            name: jenkins

          persistence:
            enabled: true

          securityContext:
            runAsUser: 1000
            fsGroup: 1000
          containerSecurityContext:
            runAsUser: 1000
            allowPrivilegeEscalation: false
          podSecurityContextOverride:
            fsGroup: 1000

          javaOpts: "-Djenkins.install.runSetupWizard=false"
          installPlugins: []
          initializeOnce: false
          overwritePlugins: false

          sidecars:
            configAutoReload:
              enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: jenkins

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
